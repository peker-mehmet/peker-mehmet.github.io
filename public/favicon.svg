<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Navy background circle -->
  <circle cx="50" cy="50" r="49" fill="#1e3a5f"/>
  <!-- Gold inner ring border -->
  <circle cx="50" cy="50" r="43.5" fill="none" stroke="#c9a84c" stroke-width="2.5"/>
  <!-- MP text -->
  <text
    x="50" y="36"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="23"
    font-weight="600"
    fill="#c9a84c"
    text-anchor="middle"
    dominant-baseline="middle">MP</text>
  <!-- Gold horizontal divider -->
  <line x1="30" y1="51" x2="70" y2="51" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Psi symbol -->
  <text
    x="50" y="68"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="23"
    fill="#c9a84c"
    text-anchor="middle"
    dominant-baseline="middle">Ψ</text>
</svg>
